name: Maintain stock data cache

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional warm ticker list. Demand-driven requests remain the source of truth."
        required: false
        default: ""
  schedule:
    - cron: "*/5 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  market_guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run: ${{ steps.guard.outputs.run }}
      reason: ${{ steps.guard.outputs.reason }}
      open_markets: ${{ steps.guard.outputs.open_markets }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Check exchange market calendar
        id: guard
        run: node --import tsx scripts/stock_market_open_guard.ts

  quote:
    needs: market_guard
    if: needs.market_guard.outputs.run == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: publish-stock-snapshots-quote
      cancel-in-progress: false
    env:
      STOCK_API_APP_KEY: ${{ secrets.STOCK_API_APP_KEY }}
      STOCK_API_APP_SECRET: ${{ secrets.STOCK_API_APP_SECRET }}
      STOCK_API_BASE: ${{ vars.STOCK_API_BASE || 'https://openapi.koreainvestment.com:9443' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MANUAL_WARM_TICKERS: ${{ github.event.inputs.tickers || '' }}
      STOCK_WARM_TICKERS: ${{ vars.STOCK_WARM_TICKERS || vars.STOCK_SNAPSHOT_TICKERS }}
      STOCK_SNAPSHOT_SLEEP_SECONDS: ${{ vars.STOCK_SNAPSHOT_SLEEP_SECONDS || '0.5' }}
      STOCK_SNAPSHOT_QUEUE_LIMIT: ${{ vars.STOCK_SNAPSHOT_QUEUE_LIMIT || '100' }}
      STOCK_SNAPSHOT_QUEUE_CONCURRENCY: ${{ vars.STOCK_SNAPSHOT_QUEUE_CONCURRENCY || '4' }}
      STOCK_REFRESH_PLANNER_QUOTE_LIMIT: ${{ vars.STOCK_REFRESH_PLANNER_QUOTE_LIMIT || '50' }}
      STOCK_STALE_QUOTE_REFRESH_LIMIT: ${{ vars.STOCK_STALE_QUOTE_REFRESH_LIMIT || '50' }}
      STOCK_WARM_BATCH_SIZE: ${{ vars.STOCK_WARM_BATCH_SIZE || '50' }}
      STOCK_WARM_POOL_LIMIT: ${{ vars.STOCK_WARM_POOL_LIMIT || '500' }}
      STOCK_WARM_FROM_DEMAND: ${{ vars.STOCK_WARM_FROM_DEMAND || '1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Plan quote refresh target jobs
        run: |
          node --import tsx scripts/plan_stock_refresh_jobs.ts \
            --kind quote \
            --limit "$STOCK_REFRESH_PLANNER_QUOTE_LIMIT" \
            --json

      - name: Enqueue stale quote refresh jobs
        run: |
          node --import tsx scripts/enqueue_stale_quote_snapshots.ts \
            --limit "$STOCK_STALE_QUOTE_REFRESH_LIMIT" \
            --json

      - name: Drain quote refresh queue and optionally warm quote snapshots
        run: |
          TICKERS="${STOCK_WARM_TICKERS:-}"
          if [ -n "$MANUAL_WARM_TICKERS" ]; then
            TICKERS="$MANUAL_WARM_TICKERS"
          fi
          ARGS=(
            --sleep-seconds "$STOCK_SNAPSHOT_SLEEP_SECONDS"
            --drain-queue
            --kind quote
            --queue-limit "$STOCK_SNAPSHOT_QUEUE_LIMIT"
            --queue-concurrency "$STOCK_SNAPSHOT_QUEUE_CONCURRENCY"
            --warm-batch-size "$STOCK_WARM_BATCH_SIZE"
            --warm-pool-limit "$STOCK_WARM_POOL_LIMIT"
            --worker-id "github-quote-${{ github.run_id }}-${{ github.run_attempt }}"
            --json
          )
          if [ "$STOCK_WARM_FROM_DEMAND" = "0" ] || [ -n "$MANUAL_WARM_TICKERS" ]; then
            ARGS+=(--no-warm-from-demand)
          fi
          if [ -n "$TICKERS" ]; then
            ARGS+=(--tickers "$TICKERS")
          fi
          node --import tsx scripts/publish_stock_snapshots.ts \
            "${ARGS[@]}"

  score:
    needs: market_guard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: publish-stock-snapshots-score
      cancel-in-progress: false
    env:
      STOCK_API_APP_KEY: ${{ secrets.STOCK_API_APP_KEY }}
      STOCK_API_APP_SECRET: ${{ secrets.STOCK_API_APP_SECRET }}
      STOCK_API_BASE: ${{ vars.STOCK_API_BASE || 'https://openapi.koreainvestment.com:9443' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MANUAL_WARM_TICKERS: ${{ github.event.inputs.tickers || '' }}
      STOCK_SCORE_WARM_TICKERS: ${{ vars.STOCK_SCORE_WARM_TICKERS || 'NVDA,TSLA,GOOGL,GOOG,AAPL,MSFT,AMZN,AVGO,MRVL,AMD,MU,MSTR,IONQ,PLTR,005930,000660' }}
      STOCK_SCORE_WARM_VIEWS: ${{ vars.STOCK_SCORE_WARM_VIEWS || 'technical' }}
      STOCK_SNAPSHOT_SLEEP_SECONDS: ${{ vars.STOCK_SNAPSHOT_SLEEP_SECONDS || '0.5' }}
      STOCK_SNAPSHOT_QUEUE_LIMIT: ${{ vars.STOCK_SNAPSHOT_QUEUE_LIMIT || '100' }}
      STOCK_SCORE_STALE_HOURS: ${{ vars.STOCK_SCORE_STALE_HOURS || '24' }}
      STOCK_REFRESH_PLANNER_SCORE_LIMIT: ${{ vars.STOCK_REFRESH_PLANNER_SCORE_LIMIT || '50' }}
      STOCK_STALE_SCORE_REFRESH_LIMIT: ${{ vars.STOCK_STALE_SCORE_REFRESH_LIMIT || '50' }}
      STOCK_LEGACY_SCORE_WORKER_ENABLED: ${{ vars.STOCK_LEGACY_SCORE_WORKER_ENABLED || '1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Plan score refresh target jobs
        if: env.STOCK_LEGACY_SCORE_WORKER_ENABLED == '1'
        run: |
          node --import tsx scripts/plan_stock_refresh_jobs.ts \
            --kind score \
            --limit "$STOCK_REFRESH_PLANNER_SCORE_LIMIT" \
            --json

      - name: Enqueue stale score snapshot refresh jobs
        if: env.STOCK_LEGACY_SCORE_WORKER_ENABLED == '1'
        run: |
          node --import tsx scripts/enqueue_stale_score_snapshots.ts \
            --stale-hours "$STOCK_SCORE_STALE_HOURS" \
            --limit "$STOCK_STALE_SCORE_REFRESH_LIMIT" \
            --json

      - name: Check due legacy score refresh jobs
        id: legacy_score_queue
        if: env.STOCK_LEGACY_SCORE_WORKER_ENABLED == '1'
        run: |
          FORCE_TICKERS="${MANUAL_WARM_TICKERS:-}"
          if [ "${{ needs.market_guard.outputs.run }}" = "1" ] && [ -n "$STOCK_SCORE_WARM_TICKERS" ]; then
            FORCE_TICKERS="$FORCE_TICKERS,$STOCK_SCORE_WARM_TICKERS"
          fi
          node --import tsx scripts/stock_refresh_queue_status.ts \
            --kind score \
            --due-only \
            --force-if-list "$FORCE_TICKERS" \
            --github-output-key run \
            --json

      - name: Set up Python
        if: steps.legacy_score_queue.outputs.run == '1'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install collector dependencies
        if: steps.legacy_score_queue.outputs.run == '1'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Drain legacy score refresh queue
        if: steps.legacy_score_queue.outputs.run == '1'
        run: |
          TICKERS="${MANUAL_WARM_TICKERS:-}"
          if [ "${{ needs.market_guard.outputs.run }}" = "1" ] && [ -z "$MANUAL_WARM_TICKERS" ]; then
            TICKERS="${STOCK_SCORE_WARM_TICKERS:-}"
          fi
          ARGS=(
            --sleep-seconds "$STOCK_SNAPSHOT_SLEEP_SECONDS"
            --drain-queue
            --queue-kind score
            --queue-limit "$STOCK_SNAPSHOT_QUEUE_LIMIT"
            --views "$STOCK_SCORE_WARM_VIEWS"
            --allow-queue-row-errors
            --worker-id "github-score-${{ github.run_id }}-${{ github.run_attempt }}"
            --json
          )
          if [ -n "$TICKERS" ]; then
            ARGS+=(--tickers "$TICKERS")
          fi
          python scripts/publish_stock_snapshots.py \
            "${ARGS[@]}"

  chart:
    needs: market_guard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: publish-stock-snapshots-chart
      cancel-in-progress: false
    env:
      STOCK_API_APP_KEY: ${{ secrets.STOCK_API_APP_KEY }}
      STOCK_API_APP_SECRET: ${{ secrets.STOCK_API_APP_SECRET }}
      STOCK_API_BASE: ${{ vars.STOCK_API_BASE || 'https://openapi.koreainvestment.com:9443' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MANUAL_WARM_TICKERS: ${{ github.event.inputs.tickers || '' }}
      STOCK_SNAPSHOT_SLEEP_SECONDS: ${{ vars.STOCK_SNAPSHOT_SLEEP_SECONDS || '0.5' }}
      STOCK_CHART_SNAPSHOT_QUEUE_LIMIT: ${{ vars.STOCK_CHART_SNAPSHOT_QUEUE_LIMIT || '15' }}
      STOCK_CHART_SNAPSHOT_QUEUE_CONCURRENCY: ${{ vars.STOCK_CHART_SNAPSHOT_QUEUE_CONCURRENCY || '2' }}
      STOCK_REFRESH_PLANNER_CHART_LIMIT: ${{ vars.STOCK_REFRESH_PLANNER_CHART_LIMIT || '15' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Plan chart refresh target jobs
        run: |
          node --import tsx scripts/plan_stock_refresh_jobs.ts \
            --kind chart \
            --limit "$STOCK_REFRESH_PLANNER_CHART_LIMIT" \
            --json

      - name: Check due chart refresh jobs
        id: chart_queue
        run: |
          node --import tsx scripts/stock_refresh_queue_status.ts \
            --kind chart \
            --due-only \
            --force-if-list "$MANUAL_WARM_TICKERS" \
            --github-output-key run \
            --json

      - name: Set up Python
        if: steps.chart_queue.outputs.run == '1'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install collector dependencies
        if: steps.chart_queue.outputs.run == '1'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Drain chart refresh queue
        if: steps.chart_queue.outputs.run == '1'
        run: |
          TICKERS="${MANUAL_WARM_TICKERS:-}"
          ARGS=(
            --sleep-seconds "$STOCK_SNAPSHOT_SLEEP_SECONDS"
            --drain-queue
            --kind chart
            --queue-limit "$STOCK_CHART_SNAPSHOT_QUEUE_LIMIT"
            --queue-concurrency "$STOCK_CHART_SNAPSHOT_QUEUE_CONCURRENCY"
            --worker-id "github-chart-${{ github.run_id }}-${{ github.run_attempt }}"
            --no-warm-from-demand
            --json
          )
          if [ -n "$TICKERS" ]; then
            ARGS+=(--tickers "$TICKERS")
          fi
          node --import tsx scripts/publish_stock_snapshots.ts \
            "${ARGS[@]}"
