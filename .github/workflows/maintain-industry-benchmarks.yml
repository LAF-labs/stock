name: Maintain industry benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 2-6"

concurrency:
  group: maintain-industry-benchmarks
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install maintenance dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify Supabase runtime readiness
        run: python scripts/supabase_runtime_readiness.py --json

      - name: Sync exchange market calendars
        run: python scripts/sync_market_calendar.py --days 550

      - name: Sync external industry benchmarks
        run: python scripts/sync_external_industry_benchmarks.py

      - name: Refresh snapshot-derived industry benchmarks
        run: python scripts/run_industry_maintenance.py --refresh-benchmarks --benchmark-min-sample-count 8 --no-cli-service-role

      - name: Audit industry classification quality
        run: python scripts/industry_quality_audit.py --json
