name: Stock operations check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * 1-5"
    - cron: "0 */3 * * 0,6"

concurrency:
  group: stock-operations-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STOCK_OPS_SAMPLE_LIMIT: ${{ vars.STOCK_OPS_SAMPLE_LIMIT || '500' }}
      STOCK_OPS_MAX_QUEUED_REFRESH_JOBS: ${{ vars.STOCK_OPS_MAX_QUEUED_REFRESH_JOBS || '1000' }}
      STOCK_OPS_MAX_STALE_SCORE_SNAPSHOTS: ${{ vars.STOCK_OPS_MAX_STALE_SCORE_SNAPSHOTS || '100' }}
      STOCK_OPS_MIN_CURRENT_SCORE_MODEL_RATE: ${{ vars.STOCK_OPS_MIN_CURRENT_SCORE_MODEL_RATE || '0.9' }}
      STOCK_OPS_MAX_DUPLICATE_SCORE_RATE: ${{ vars.STOCK_OPS_MAX_DUPLICATE_SCORE_RATE || '0.5' }}
      STOCK_OPS_MAX_MISSING_QUOTE_PRICE: ${{ vars.STOCK_OPS_MAX_MISSING_QUOTE_PRICE || '25' }}
      MARKET_DATA_SERVICE_URL: ${{ vars.MARKET_DATA_SERVICE_URL }}
      MARKET_DATA_INTERNAL_TOKEN: ${{ secrets.MARKET_DATA_INTERNAL_TOKEN }}
      STOCK_LATENCY_BASE_URL: ${{ vars.STOCK_LATENCY_BASE_URL || 'https://stock-khaki.vercel.app' }}
      STOCK_LATENCY_HOT_TICKER: ${{ vars.STOCK_LATENCY_HOT_TICKER || 'US:KO' }}
      STOCK_LATENCY_COLD_TICKER: ${{ vars.STOCK_LATENCY_COLD_TICKER || 'US:POET' }}
      STOCK_LATENCY_ITERATIONS: ${{ vars.STOCK_LATENCY_ITERATIONS || '3' }}
      STOCK_LATENCY_WARMUP_ITERATIONS: ${{ vars.STOCK_LATENCY_WARMUP_ITERATIONS || '1' }}
      STOCK_LATENCY_MAX_P95_MS: ${{ vars.STOCK_LATENCY_MAX_P95_MS || '1500' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Run operations threshold check
        run: |
          node --import tsx scripts/stock_operations_report.ts \
            --json \
            --fail-on-threshold \
            --sample-limit "$STOCK_OPS_SAMPLE_LIMIT" \
            --max-dead-refresh-jobs 0 \
            --max-stale-running-refresh-jobs 0 \
            --max-queued-refresh-jobs "$STOCK_OPS_MAX_QUEUED_REFRESH_JOBS" \
            --max-stale-score-snapshots "$STOCK_OPS_MAX_STALE_SCORE_SNAPSHOTS" \
            --min-current-score-model-rate "$STOCK_OPS_MIN_CURRENT_SCORE_MODEL_RATE" \
            --max-duplicate-score-rate "$STOCK_OPS_MAX_DUPLICATE_SCORE_RATE" \
            --max-low-confidence-high-score 0 \
            --max-missing-quote-price "$STOCK_OPS_MAX_MISSING_QUOTE_PRICE" \
            --max-expired-industry-benchmark-rows 0 \
            --max-market-calendar-thin-markets 0 \
            --max-market-data-service-failures 0

      - name: Run production latency smoke
        run: |
          node scripts/load_test_stock_latency.mjs \
            --base-url "$STOCK_LATENCY_BASE_URL" \
            --hot-ticker "$STOCK_LATENCY_HOT_TICKER" \
            --cold-ticker "$STOCK_LATENCY_COLD_TICKER" \
            --iterations "$STOCK_LATENCY_ITERATIONS" \
            --warmup-iterations "$STOCK_LATENCY_WARMUP_ITERATIONS" \
            --max-p95-ms "$STOCK_LATENCY_MAX_P95_MS" \
            --json
