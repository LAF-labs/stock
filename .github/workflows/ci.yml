name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  python:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python tests
        run: python -m unittest discover tests

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set stable Rust toolchain
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/market-data/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/market-data/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        run: cargo test --manifest-path services/market-data/Cargo.toml

  market-data-container:
    name: Market-data container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build market-data image
        run: docker build --target market-data -t stock-market-data:ci .

      - name: Smoke health and metrics
        env:
          MARKET_DATA_INTERNAL_TOKEN: ci-internal-token
        run: |
          set -euo pipefail
          docker run -d --rm \
            --name stock-market-data-smoke \
            -e MARKET_DATA_INTERNAL_TOKEN="$MARKET_DATA_INTERNAL_TOKEN" \
            -p 18080:8080 \
            stock-market-data:ci
          trap 'docker stop stock-market-data-smoke >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz >/tmp/market-data-health.json; then
              break
            fi
            sleep 1
          done

          grep '"ok":true' /tmp/market-data-health.json
          curl -fsS \
            -H "Authorization: Bearer $MARKET_DATA_INTERNAL_TOKEN" \
            http://127.0.0.1:18080/metrics \
            | grep market_data_service_info
